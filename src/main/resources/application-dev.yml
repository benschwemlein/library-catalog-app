# Development profile - H2 in-memory, verbose SQL logging, relaxed mail, debug security
spring:
  datasource:
    url: jdbc:h2:mem:librarydb_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    enabled: false
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    com.example.library: DEBUG
    com.example.catalog: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.scheduling: DEBUG

application:
  security:
    jwt:
      secret-key: dev-secret-key-for-development-only-do-not-use-in-production-32bytes
      expiration: 86400000
      refresh-token:
        expiration: 604800000
  library:
    max-loans-per-member: 8
    default-loan-period-days: 21
    overdue-fine-grace-period-days: 1
    max-renewals: 3
    hold-expiry-days: 7
    recommendation-cache-ttl-minutes: 1
    unpaid-fines-threshold: "10.00"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
