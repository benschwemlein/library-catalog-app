# Local development override — uses H2 in-memory, shows SQL, enables H2 console
spring:
  datasource:
    url: jdbc:h2:mem:librarydb_local;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    enabled: false

logging:
  level:
    com.example.library: DEBUG
    com.example.catalog: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

application:
  security:
    jwt:
      secret-key: local-dev-secret-key-for-testing-only-do-not-use-in-any-deployed-env
