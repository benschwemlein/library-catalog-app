<div class="admin-dash">

  <!-- Page header -->
  <div class="dash-header">
    <div>
      <h1>Admin Dashboard</h1>
      <p>Library system overview and quick actions</p>
    </div>
    <div class="dash-header-actions">
      <button [routerLink]="['/admin/reports']" class="btn btn-secondary btn-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
        Reports
      </button>
      <button [routerLink]="['/staff/checkout']" class="btn btn-primary btn-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New Checkout
      </button>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading-spinner">
    <div class="spinner"></div>
  </div>

  <!-- Stats row -->
  <div class="stats-row animate-in" *ngIf="!loading">

    <div class="stat-card stat-books" [routerLink]="['/catalog/books']">
      <div class="stat-bg-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </div>
      <div class="stat-value">{{ totalBooks }}</div>
      <div class="stat-label">Total Books</div>
      <div class="stat-trend">in catalog</div>
    </div>

    <div class="stat-card stat-members" [routerLink]="['/admin/members']">
      <div class="stat-bg-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="stat-value">{{ totalMembers }}</div>
      <div class="stat-label">Members</div>
      <div class="stat-trend">registered</div>
    </div>

    <div class="stat-card stat-loans" [routerLink]="['/admin/inventory']">
      <div class="stat-bg-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <div class="stat-value">{{ activeLoans }}</div>
      <div class="stat-label">Active Loans</div>
      <div class="stat-trend">checked out</div>
    </div>

    <div class="stat-card" [class.stat-overdue]="overdueCount > 0" [class.stat-clear]="overdueCount === 0" [routerLink]="['/admin/reports']">
      <div class="stat-bg-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="stat-value">{{ overdueCount }}</div>
      <div class="stat-label">Overdue Items</div>
      <div class="stat-trend">{{ overdueCount === 0 ? 'all clear' : 'need attention' }}</div>
    </div>

  </div>

  <!-- Quick Actions -->
  <div class="section animate-in" style="animation-delay:0.1s">
    <h2 class="section-title">Quick Actions</h2>
    <div class="actions-grid">

      <button [routerLink]="['/staff/checkout']" class="action-tile">
        <div class="action-icon action-icon-primary">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <span class="action-title">Checkout</span>
        <span class="action-desc">Issue a book to a member</span>
      </button>

      <button [routerLink]="['/staff/returns']" class="action-tile">
        <div class="action-icon action-icon-teal">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </div>
        <span class="action-title">Returns</span>
        <span class="action-desc">Process book returns</span>
      </button>

      <button [routerLink]="['/admin/members']" class="action-tile">
        <div class="action-icon action-icon-violet">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <span class="action-title">Members</span>
        <span class="action-desc">Manage member accounts</span>
      </button>

      <button [routerLink]="['/admin/inventory']" class="action-tile">
        <div class="action-icon action-icon-amber">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        </div>
        <span class="action-title">Inventory</span>
        <span class="action-desc">Track physical copies</span>
      </button>

      <button [routerLink]="['/admin/reports']" class="action-tile">
        <div class="action-icon action-icon-emerald">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
        </div>
        <span class="action-title">Reports</span>
        <span class="action-desc">Analytics &amp; statistics</span>
      </button>

      <button [routerLink]="['/admin/events']" class="action-tile">
        <div class="action-icon action-icon-rose">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <span class="action-title">Events</span>
        <span class="action-desc">Schedule &amp; manage events</span>
      </button>

      <button [routerLink]="['/admin/acquisitions']" class="action-tile">
        <div class="action-icon action-icon-primary">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </div>
        <span class="action-title">Acquisitions</span>
        <span class="action-desc">Order new materials</span>
      </button>

      <button [routerLink]="['/admin/donations']" class="action-tile">
        <div class="action-icon action-icon-teal">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <span class="action-title">Donations</span>
        <span class="action-desc">Track gift materials</span>
      </button>

    </div>
  </div>

</div>
