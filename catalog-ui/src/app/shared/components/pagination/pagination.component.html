<nav *ngIf="totalPages > 1" aria-label="Page navigation">
  <ul class="pagination justify-content-center mb-0">

    <!-- Previous -->
    <li class="page-item" [class.disabled]="currentPage === 1">
      <a class="page-link" href="javascript:void(0)" aria-label="Previous"
         (click)="goToPage(currentPage - 1)">
        <span aria-hidden="true">&laquo;</span>
      </a>
    </li>

    <!-- First page + leading ellipsis -->
    <li *ngIf="showLeadingEllipsis" class="page-item">
      <a class="page-link" href="javascript:void(0)" (click)="goToPage(1)">1</a>
    </li>
    <li *ngIf="showLeadingEllipsis" class="page-item disabled">
      <span class="page-link">...</span>
    </li>

    <!-- Visible page numbers -->
    <li
      *ngFor="let page of pageNumbers"
      class="page-item"
      [class.active]="page === currentPage"
      [attr.aria-current]="page === currentPage ? 'page' : null"
    >
      <a class="page-link" href="javascript:void(0)" (click)="goToPage(page)">{{ page }}</a>
    </li>

    <!-- Trailing ellipsis + last page -->
    <li *ngIf="showTrailingEllipsis" class="page-item disabled">
      <span class="page-link">...</span>
    </li>
    <li *ngIf="showTrailingEllipsis" class="page-item">
      <a class="page-link" href="javascript:void(0)" (click)="goToPage(totalPages)">{{ totalPages }}</a>
    </li>

    <!-- Next -->
    <li class="page-item" [class.disabled]="currentPage === totalPages">
      <a class="page-link" href="javascript:void(0)" aria-label="Next"
         (click)="goToPage(currentPage + 1)">
        <span aria-hidden="true">&raquo;</span>
      </a>
    </li>

  </ul>
</nav>
