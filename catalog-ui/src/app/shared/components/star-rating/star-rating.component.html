<div class="star-rating d-inline-flex gap-1" [attr.aria-label]="'Rating: ' + rating + ' out of ' + maxStars">
  <ng-container *ngFor="let star of stars">
    <span
      class="bi fs-5"
      [ngClass]="starClass(star)"
      [class.cursor-pointer]="!readonly"
      [attr.aria-label]="'Star ' + star.index"
      (mouseenter)="onMouseEnter(star.index)"
      (mouseleave)="onMouseLeave()"
      (click)="onStarClick(star.index)"
    ></span>
  </ng-container>
</div>

<style>
  .cursor-pointer { cursor: pointer; }
</style>
