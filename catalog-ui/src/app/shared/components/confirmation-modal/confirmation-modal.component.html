<!-- Bootstrap modal structure — parent is responsible for showing/hiding -->
<div class="modal d-block" tabindex="-1" role="dialog" aria-modal="true"
     [attr.aria-labelledby]="'confirmModalTitle'">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">

      <!-- Header -->
      <div class="modal-header">
        <h5 class="modal-title" id="confirmModalTitle">{{ title }}</h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="onCancel()"></button>
      </div>

      <!-- Body -->
      <div class="modal-body">
        <p class="mb-0">{{ message }}</p>
      </div>

      <!-- Footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">
          {{ cancelText }}
        </button>
        <button type="button" class="btn" [ngClass]="confirmButtonClass" (click)="onConfirm()">
          {{ confirmText }}
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Backdrop -->
<div class="modal-backdrop fade show"></div>
