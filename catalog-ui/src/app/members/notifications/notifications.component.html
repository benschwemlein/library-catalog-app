<div class="notifications-container">
  <div class="notifications-header">
    <h2>Notifications</h2>
    <div class="header-actions">
      <span *ngIf="unreadCount > 0" class="unread-count">{{ unreadCount }} unread</span>
      <button *ngIf="unreadCount > 0" (click)="markAllRead()" [disabled]="markingAll" class="btn btn-secondary btn-sm">
        {{ markingAll ? 'Marking...' : 'Mark All Read' }}
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="loading-spinner"><div class="spinner"></div></div>

  <div *ngIf="!loading && notifications.length === 0" class="empty-state">
    <p>No notifications.</p>
  </div>

  <ul *ngIf="!loading && notifications.length > 0" class="notification-list">
    <li
      *ngFor="let notification of notifications"
      class="notification-item"
      [class.unread]="!notification.read"
      (click)="markRead(notification)"
    >
      <span class="notification-icon">{{ getTypeIcon(notification.type) }}</span>
      <div class="notification-content">
        <strong>{{ notification.subject }}</strong>
        <p>{{ notification.message }}</p>
        <small>{{ notification.sentAt | date:'short' }}</small>
      </div>
      <span *ngIf="!notification.read" class="unread-dot"></span>
    </li>
  </ul>
</div>
